name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build

      - name: Simulate APK build
        run: |
          mkdir -p output
          echo "This simulates an APK file." > output/SafeSpotApp.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v2
        with:
          name: safespot-apk
          path: output/SafeSpotApp.apk
